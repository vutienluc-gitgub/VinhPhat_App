<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vĩnh Phát — Mất kết nối</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Be Vietnam Pro', 'Segoe UI', sans-serif;
      background: #0f2744;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .logo {
      width: 72px;
      height: 72px;
      background: #1e3a5f;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 28px;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #e2e8f0;
    }
    p {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.65;
      max-width: 340px;
      margin-bottom: 32px;
    }
    .btn-retry {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-retry:hover { background: #1d4ed8; }
    .note {
      margin-top: 24px;
      font-size: 12px;
      color: #475569;
    }
    .wifi-icon {
      margin-bottom: 20px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="logo">VP</div>

  <svg class="wifi-icon" width="56" height="48" viewBox="0 0 56 48" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M28 42a4 4 0 1 1 0-8 4 4 0 0 1 0 8Z" fill="#64748b"/>
    <path d="M14.5 29c3.6-3.6 8.5-5.8 13.5-5.8s9.9 2.2 13.5 5.8" stroke="#64748b" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M5 19C11.1 13 19.1 9.5 28 9.5S44.9 13 51 19" stroke="#64748b" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.4"/>
    <!-- Strike through -->
    <line x1="4" y1="44" x2="52" y2="4" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
  </svg>

  <h1>Không có kết nối mạng</h1>
  <p>
    Ứng dụng Vĩnh Phát cần kết nối internet để đồng bộ dữ liệu với Google Sheets.<br>
    Vui lòng kiểm tra kết nối mạng và thử lại.
  </p>

  <button class="btn-retry" onclick="window.location.reload()">Thử lại</button>

  <p class="note">Dữ liệu đã lưu sẽ được tự động đồng bộ khi có mạng trở lại.</p>
</body>
</html>
